{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<h1>Entrar</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Entrar</button>
</form>

<div class="links">
    <p><a href="{% url 'password_reset' %}">Esqueceu a senha?</a></p>
    <p><a href="{% url 'signup' %}">Criar conta</a></p>
</div>
{% endblock %}
