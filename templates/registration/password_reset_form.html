{% extends "base.html" %}

{% block title %}Redefinir senha{% endblock %}

{% block content %}
<h1>Redefinir senha</h1>
<p>Informe seu e-mail para receber o link de redefinição.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Enviar link</button>
</form>

<div class="links">
    <p><a href="{% url 'login' %}">Voltar ao login</a></p>
</div>
{% endblock %}
